on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-push:
    strategy:
      matrix:
        arch: ["amd64", "arm64"]
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1
      - name: Setup Qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/${{ matrix.arch }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/build-push-action@v5
        with:
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          tags: ghcr.io/${{ github.repository }}/kwiver-spack-build-base:${{ matrix.arch }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/kwiver-spack-build-base:${{ matrix.arch }}
          cache-to: type=inline
          push: true
          load: true
      